<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaBot</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:white;margin:0;display:flex;flex-direction:column;height:100vh}
header{background:#020617;padding:12px 16px;font-weight:bold}
#chat{flex:1;overflow-y:auto;padding:15px}
.msg{margin-bottom:10px}
.user{color:#38bdf8}
.bot{color:#a7f3d0}
#inputBox{display:flex;border-top:1px solid #1e293b}
#text{flex:1;padding:10px;border:none;outline:none;background:#020617;color:white}
button{padding:10px 16px;border:none;background:#22c55e;color:black;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<header>💊 PharmaBot (D Pharma AI)</header>
<div id="chat"></div>
<div id="inputBox">
<input id="text" placeholder="Ask Pharma question...">
<button onclick="send()">Send</button>
</div><script>
const API_KEY="AIzaSyDyAifVgcv4QH26yLqeO10pptWdvUr0v_Y";
const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

async function send(){
const input=document.getElementById("text");
const chat=document.getElementById("chat");
const msg=input.value.trim();
if(!msg)return;

chat.innerHTML+=`<div class='msg user'>You: ${msg}</div>`;
input.value="";

const body={
contents:[{parts:[{text:`Answer for D Pharma student in Hinglish: ${msg}`}]}]
};

try{
const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
const data=await res.json();
let reply="Error";
if(data.candidates){reply=data.candidates[0].content.parts[0].text}
chat.innerHTML+=`<div class='msg bot'>Bot: ${reply}</div>`;
chat.scrollTop=chat.scrollHeight;
}catch(e){
chat.innerHTML+=`<div class='msg bot'>Bot: Network error</div>`;
}
}
</script></body>
</html>
